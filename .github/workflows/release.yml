name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6

      # Swift is preinstalled on the macOS runner — no toolchain setup needed
      # (unlike the Zig project, which had to install Zig).

      - name: Decode signing certificate
        env:
          CERTIFICATE_P12: ${{ secrets.CERTIFICATE_P12 }}
          CERTIFICATE_PASSWORD: ${{ secrets.CERTIFICATE_PASSWORD }}
        run: |
          echo "$CERTIFICATE_P12" | base64 --decode > certificate.p12
          KEYCHAIN_PASSWORD="$(openssl rand -base64 32)"

          security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security set-keychain-settings -t 3600 -u build.keychain

          security import certificate.p12 -k build.keychain \
            -P "$CERTIFICATE_PASSWORD" -T /usr/bin/codesign -T /usr/bin/pkgbuild
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" build.keychain

          rm certificate.p12

      - name: Store notarization credentials
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
        run: |
          xcrun notarytool store-credentials "notary-profile" \
            --apple-id "$APPLE_ID" \
            --team-id "$APPLE_TEAM_ID" \
            --password "$APPLE_APP_PASSWORD"

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build, sign, notarize, and package
        env:
          VERSION: ${{ steps.version.outputs.VERSION }}
        run: |
          sed -i '' "s/^VERSION=.*/VERSION=\"$VERSION\"/" release.sh
          chmod +x release.sh
          ./release.sh

      - name: Create Homebrew tarball
        env:
          VERSION: ${{ steps.version.outputs.VERSION }}
        run: |
          # Package the signed, notarized, stapled .app as a tarball for Homebrew.
          # Shipped as-is to preserve the code signature + stapled ticket.
          tar -czf "release-build/aerospace-kd100-${VERSION}-macos-universal.tar.gz" \
            -C release-build kd100.app

      - name: Upload release assets
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ steps.version.outputs.VERSION }}
        run: |
          PKG="release-build/aerospace-kd100-${VERSION}-macos-universal.pkg"
          TAR="release-build/aerospace-kd100-${VERSION}-macos-universal.tar.gz"
          gh release create "$GITHUB_REF_NAME" \
            "$PKG" "$TAR" \
            --title "aerospace-kd100 v${VERSION}" \
            --generate-notes

      - name: Print Homebrew SHA256
        env:
          VERSION: ${{ steps.version.outputs.VERSION }}
        run: |
          echo "=== Update Formula/aerospace-kd100.rb in piotrrojek/homebrew-tap ==="
          echo "url:    https://github.com/piotrrojek/aerospace-kd100/releases/download/${GITHUB_REF_NAME}/aerospace-kd100-${VERSION}-macos-universal.tar.gz"
          echo "sha256: $(shasum -a 256 release-build/aerospace-kd100-${VERSION}-macos-universal.tar.gz | cut -d' ' -f1)"
